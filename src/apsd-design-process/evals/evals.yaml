skill_name: "apsd-design-process"
evals:
  - id: "design-process-negative-first-idea"
    name: "design process negative first idea"
    prompt: |
      Review this implementation plan.

      <example>We will add another flag to the method because it is the fastest fix. We did not compare other designs because the bug is urgent.</example>
    expected_output: "The response rejects tactical first-idea patching and asks for at least one alternative."
    assertions:
      - "The output identifies the relevant concept as apsd-design-process."
      - "The Fault names tactical patching, first-idea lock-in, or missing alternatives."
      - "The Better section calls for at least one materially different design or a clearer interface-first approach."
  - id: "design-process-positive-interface-first"
    name: "design process positive interface first"
    prompt: |
      Assess this plan.

      <example>Before coding the importer, we will write the interface comment, sketch two parsing strategies, and choose the one that keeps callers insulated from file-format quirks.</example>
    expected_output: "The response preserves a process that explicitly compares alternatives and starts with the abstraction."
    assertions:
      - "The output identifies the relevant concept as apsd-design-process."
      - "The output uses Preserve for the strong example."
      - "The Why or Checks sections explain that the process considers alternatives and clarifies the interface before implementation."

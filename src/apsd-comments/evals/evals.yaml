skill_name: "apsd-comments"
evals:
  - id: "comments-negative-repeats-code"
    name: "comments negative repeats code"
    prompt: |
      Review this comment.

      <example>token []byte // Last token returned by split.</example>
    expected_output: "The response rejects the comment because it mostly repeats information already visible in the identifier and type."
    assertions:
      - "The output identifies the relevant concept as apsd-comments."
      - "The Fault names that the comment repeats the code rather than adding information."
      - "The Better section removes the useless comment or replaces it with genuinely non-obvious information."
  - id: "comments-positive-boundary-comment"
    name: "comments positive boundary comment"
    prompt: |
      Assess this implementation note and revise only if needed.

      <example>Programs that need more control over error handling or large tokens, or must run sequential scans on a reader, should use Reader instead.</example>
    expected_output: "The response preserves a comment that draws a real abstraction boundary for callers."
    assertions:
      - "The output says no revision is needed or otherwise preserves the supplied note without replacing it with a longer rewritten comment."
      - "The Why or Checks sections explain that the note adds boundary information not visible from the identifier alone."

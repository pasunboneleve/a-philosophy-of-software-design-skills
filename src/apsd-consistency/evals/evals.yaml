skill_name: "apsd-consistency"
evals:
  - id: "consistency-negative-mixed-error-style"
    name: "consistency negative mixed error style"
    prompt: |
      Review this API note.

      <example>readFile returns null on failure, writeFile throws IOError, and deleteFile returns true or false.</example>
    expected_output: "The response names the inconsistency and recommends a single error convention."
    assertions:
      - "The output identifies the relevant concept as apsd-consistency."
      - "The Fault names inconsistent error handling or convention drift concretely."
      - "The Better section aligns the operations behind one clear convention."
  - id: "consistency-negative-style-innovation"
    name: "consistency negative style innovation"
    prompt: |
      Review this code note.

      <example>The codebase uses snake_case everywhere, but this new module introduces camelCase names because the author prefers them.</example>
    expected_output: "The response rejects local style innovation that breaks an established project pattern."
    assertions:
      - "The output identifies the relevant concept as apsd-consistency."
      - "The Fault names the mismatch with the existing convention."
      - "The Better section restores the project convention rather than preserving the local preference."

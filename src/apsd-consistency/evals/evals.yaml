skill_name: "apsd-consistency"
evals:
  - id: "consistency-negative-mixed-threading-names"
    name: "consistency negative mixed threading names"
    prompt: |
      Review this API note.

      <example>This module's docs tell users to call current_thread() and is_set(), but examples in the same API still mention currentThread() and isSet().</example>
    expected_output: "The response names the convention drift and recommends one primary naming convention."
    assertions:
      - "The output identifies the relevant concept as apsd-consistency."
      - "The Fault names inconsistent naming or convention drift concretely."
      - "The Better section aligns the operations behind one clear convention."
  - id: "consistency-positive-snake-case-primary"
    name: "consistency positive snake case primary"
    prompt: |
      Assess this API note and revise only if needed.

      <example>The public API uses current_thread() and is_set() as the primary spellings, and keeps older aliases only as deprecated compatibility names.</example>
    expected_output: "The response preserves one primary convention and treats compatibility aliases as secondary."
    assertions:
      - "The output identifies the relevant concept as apsd-consistency."
      - "The output uses Preserve for the strong example."
      - "The Why or Checks sections explain that one primary convention reduces surprise."

skill_name: "apsd-software-design"
evals:
  - id: "router-general-purpose-prefix-removal"
    name: "router general purpose prefix removal"
    prompt: |
      Review this design note.

      <example>Several call sites each hand-roll their own startswith-plus-slice logic to remove known prefixes from strings.</example>
    expected_output: "The response routes the problem through the complexity or somewhat-general-purpose skill rather than treating it as mere style."
    assertions:
      - "The output uses the router shape with Selected skills, Diagnosis, Revision, and Checks sections."
      - "The output selects apsd-complexity or apsd-general-purpose with evidence from repeated caller-side logic."
      - "The Revision proposes a more localized or more general-purpose design rather than only restating the problem."
  - id: "router-proof-tree-api"
    name: "router proof tree api"
    prompt: |
      Review this API note.

      <example>The ordinary evaluate_root_goal entry point makes every caller pass a proof-tree flag and receive an optional proof-tree payload even when they do not need inspection.</example>
    expected_output: "The response routes the problem to deep modules."
    assertions:
      - "The output contains a `Selected skills:` section with an `apsd-deep-modules` bullet, and that bullet names the proof-tree flag, optional proof-tree result, or common-case burden."
      - "The Diagnosis names shallow interface, leaked uncommon-case detail, or missing abstraction value concretely."
  - id: "router-special-case-unlink"
    name: "router special case unlink"
    prompt: |
      Review this API note.

      <example>In normal cleanup paths, deleting a temporary file may raise FileNotFoundError because another step may already have removed the path first.</example>
    expected_output: "The response routes the problem to the error-design skill."
    assertions:
      - "The output contains a `Selected skills:` section with an `apsd-errors` bullet."
      - "The Revision says to make deletion idempotent or return a status/result instead of throwing FileNotFoundError."
  - id: "router-preserve-scanner"
    name: "router preserve scanner"
    prompt: |
      Review this design note and revise only if needed.

      <example>Scanner exposes Scan, Text, Bytes, and Err, while hiding buffering, token boundaries, and scan-state bookkeeping internally.</example>
    expected_output: "The response preserves a design that is already strong."
    assertions:
      - "The output says no revision is needed or preserves the design without substantive rewriting."
      - "The output selects only the skills needed to explain the passing design, such as apsd-deep-modules."

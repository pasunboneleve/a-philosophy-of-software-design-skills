skill_name: "apsd-deep-modules"
evals:
  - id: "deep-modules-negative-proof-tree-parameter"
    name: "deep modules negative proof tree parameter"
    prompt: |
      Review this API note.

      <example>evaluate_root_goal(goal, generateProofTree, span, stalledOn) is the ordinary entry point, even though most callers always pass No for generateProofTree and ignore the optional proof-tree result.</example>
    expected_output: "The response names the leaked uncommon-case machinery as a shallow interface and recommends a clearer boundary."
    assertions:
      - "The output identifies the relevant concept as apsd-deep-modules."
      - "The Fault names shallow interface, information leakage, or uncommon-case burden concretely."
      - "The Better section removes the common-case proof-tree burden from the ordinary entry point or splits the specialized path into a separate interface."
  - id: "deep-modules-positive-hidden-scanner-state"
    name: "deep modules positive hidden scanner state"
    prompt: |
      Assess this API note.

      <example>Scanner exposes Scan, Text, Bytes, and Err. Internally it manages buffering, token boundaries, growth limits, and sentinel-error handling without callers knowing those details.</example>
    expected_output: "The response preserves a small interface that hides substantial implementation work."
    assertions:
      - "The output identifies the relevant concept as apsd-deep-modules."
      - "The output uses Preserve for the strong example."
      - "The Why or Checks sections explain that callers do not need to know the hidden implementation details."

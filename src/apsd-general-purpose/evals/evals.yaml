skill_name: "apsd-general-purpose"
evals:
  - id: "general-purpose-negative-hand-rolled-prefix"
    name: "general purpose negative hand rolled prefix"
    prompt: |
      Review this API note.

      <example>Several standard-library call sites each open-code the same prefix-removal pattern:
      if test_func_name.startswith("test_"):
          print(test_func_name[5:])
      else:
          print(test_func_name)</example>
    expected_output: "The response recommends a shared, somewhat general-purpose prefix-removal primitive."
    assertions:
      - "The output identifies the relevant concept as apsd-general-purpose."
      - "The Fault names repeated one-off caller-side logic or the absence of a shared prefix-removal primitive."
      - "The Better section consolidates related operations into a shared, more general primitive, such as a single prefix-removal method."
  - id: "general-purpose-negative-overgeneralized-lstrip"
    name: "general purpose negative overgeneralized lstrip"
    prompt: |
      Review this API note.

      <example>Instead of a dedicated prefix-removal method, the string API could expand lstrip() so callers write 'foobar'.lstrip(('foo',)) and get repeated prefix handling through one generalized entry point.</example>
    expected_output: "The response rejects an over-general interface whose common case is buried under awkward configuration."
    assertions:
      - "The output identifies the relevant concept as apsd-general-purpose."
      - "The Fault names that the interface is over-general or too configurable."
      - "The Better section restores a simpler common path instead of preserving the large options surface."
